name: build

on:
  push:
    branches:
      - master
  pull_request:

# Build the v9 images on every PR/push. The app build runs collectstatic +
# compress, so a green build also proves settings.py loads. Go services build
# from the parameterized Dockerfile per component. No registry push here;
# publishing is done via the Makefile / docker-bake.hcl.
jobs:
  app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build RapidPro app image (v9.0.0)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: morrismukiri/rapidpro:ci
          build-args: |
            RAPIDPRO_VERSION=v9.0.0
            RAPIDPRO_REPO=rapidpro/rapidpro
            NODE_MAJOR=20

  go-services:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { binary: mailroom,    repo: nyaruka/mailroom,    version: "9.0.1", port: "8090" }
          - { binary: courier,     repo: nyaruka/courier,     version: "9.0.1", port: "8080" }
          - { binary: rp-indexer,  repo: nyaruka/rp-indexer,  version: "9.0.0", port: "8080" }
          - { binary: rp-archiver, repo: nyaruka/rp-archiver, version: "9.0.0", port: "8080" }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.binary }} (v${{ matrix.version }})
        uses: docker/build-push-action@v6
        with:
          context: go-services
          file: go-services/Dockerfile
          push: false
          tags: morrismukiri/${{ matrix.binary }}:ci
          build-args: |
            BINARY=${{ matrix.binary }}
            REPO=${{ matrix.repo }}
            VERSION=${{ matrix.version }}
            PORT=${{ matrix.port }}
